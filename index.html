<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <img id="header-img" src="https://via.placeholder.com/150" alt="Logo">
    
    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Video</a>
      <a class="nav-link" href="#signup">Sign Up</a>
    </nav>
  </header>

  <!-- FEATURES SECTION -->
  <section id="features">
    <h2>Product Features</h2>
    <p>Here are some amazing features of our product.</p>
  </section>

  <!-- VIDEO SECTION -->
  <section id="video-section">
    <h2>Product Video</h2>
    <video id="video" controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  </section>

  <!-- SIGNUP FORM SECTION -->
  <section id="signup">
    <h2>Sign Up for Updates</h2>
    <form id="form" action="https://www.freecodecamp.org/email-submit">
      <input id="email" name="email" type="email" placeholder="Enter your email" required>
      <input id="submit" type="submit" value="Submit">
    </form>
  </section>

  <!-- FOOTER -->
  <footer id="footer">
    <p>&copy; 2026 Product Landing Page. All rights reserved.</p>
  </footer>

</body>
</html>
